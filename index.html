<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex BR</title>
  <meta name="description" content="Pokédex completa com todos os Pokémon, estatísticas, evoluções e muito mais." />

  <!-- fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/detail.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div id="app">
    <!-- particulas -->
    <canvas id="particles-canvas"></canvas>

    <!-- navbar -->
    <app-navbar
      :search="search"
      :type-filter="typeFilter"
      :sort-by="sortBy"
      :current-gen="currentGen"
      :shiny-mode="shinyMode"
      @update:search="search = $event"
      @update:type-filter="typeFilter = $event"
      @update:sort-by="sortBy = $event"
      @update:current-gen="currentGen = $event"
      @toggle-shiny="shinyMode = !shinyMode"
    ></app-navbar>

    <!-- Mmain list view -->
    <main v-show="!detailOpen" id="main-view">
      <app-hero
        :filtered-count="filteredList.length"
        :total-count="allPokemon.length"
        :loading="isLoading"
        :load-progress="loadProgress"
      ></app-hero>

      <div class="page-wrap" v-show="!isLoading || allPokemon.length > 0">
        <div class="grid" v-if="filteredList.length > 0">
          <pokemon-card
            v-for="(pokemon, index) in filteredList"
            :key="pokemon.id"
            :pokemon="pokemon"
            :index="index"
            :is-favorite="favorites.includes(pokemon.id)"
            :shiny-mode="shinyMode"
            @open-detail="openDetail"
            @toggle-favorite="toggleFavorite"
          ></pokemon-card>
        </div>
        <div class="empty" v-else-if="!isLoading">
          <span class="empty-icon">😶</span>
          <p>Nenhum Pokémon encontrado.</p>
          <small>Tente outro nome, número ou tipo.</small>
        </div>
      </div>
    </main>

    <!-- detail page -->
    <pokemon-detail
      v-if="detailOpen"
      :pokemon="selectedPokemon"
      :shiny-mode="shinyMode"
      :is-favorite="selectedPokemon ? favorites.includes(selectedPokemon.id) : false"
      @close="closeDetail"
      @toggle-favorite="toggleFavorite"
      @navigate="openDetail"
    ></pokemon-detail>

    <!-- scroll to top -->
    <button class="scroll-top" :class="{ visible: showScrollTop }" @click="scrollToTop" aria-label="Voltar ao topo">↑</button>

    <!-- toast -->
    <div class="toast" :class="{ show: toast.show }">{{ toast.message }}</div>
  </div>

  <!-- vue -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- app-modulos -->
  <script src="js/constants.js"></script>
  <script src="js/api.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/components/NavBar.js"></script>
  <script src="js/components/Hero.js"></script>
  <script src="js/components/PokemonCard.js"></script>
  <script src="js/components/PokemonDetail.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
